<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Spun By Gods</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{background:#050308;min-height:100vh;display:flex;justify-content:center;align-items:flex-start}
.root{width:380px;min-height:680px;background:#0d0810;font-family:'Cinzel',serif;color:#e8d5a3;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px}
.bglayer{position:absolute;inset:0;background:radial-gradient(ellipse at 20% 10%,rgba(120,30,30,0.15) 0%,transparent 50%),radial-gradient(ellipse at 80% 90%,rgba(60,20,80,0.18) 0%,transparent 50%);pointer-events:none;z-index:0}
.emberlayer{position:absolute;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.ember{position:absolute;bottom:-10px;width:3px;height:3px;border-radius:50%;background:#c9a84c;box-shadow:0 0 6px rgba(201,168,76,.8);animation:floatUp linear infinite}
@keyframes floatUp{0%{transform:translateY(0) translateX(0);opacity:0}10%{opacity:1}90%{opacity:.6}100%{transform:translateY(-700px) translateX(20px);opacity:0}}
.z1{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center}
.glyph{font-size:32px;color:#c9a84c;text-shadow:0 0 20px rgba(201,168,76,.5);margin-bottom:18px;animation:spinSlow 12s linear infinite}
@keyframes spinSlow{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.htitle{font-size:32px;font-weight:700;letter-spacing:6px;color:#c9a84c;text-shadow:0 0 30px rgba(201,168,76,0.5);animation:titleGlow 3s ease-in-out infinite}
@keyframes titleGlow{0%,100%{text-shadow:0 0 24px rgba(201,168,76,0.4)}50%{text-shadow:0 0 38px rgba(201,168,76,0.75)}}
.hdiv{width:180px;height:1px;background:linear-gradient(90deg,transparent,#c9a84c66,transparent);margin:16px auto}
.htag{font-family:'Crimson Text',serif;font-style:italic;font-size:12px;letter-spacing:2px;color:#8a7a5a;margin-bottom:50px}
.enterbtn{background:rgba(18,10,5,0.95);border:1px solid #c9a84c;color:#c9a84c;font-family:'Cinzel',serif;font-size:13px;letter-spacing:5px;padding:13px 50px;border-radius:4px;cursor:pointer;text-shadow:0 0 6px rgba(201,168,76,0.4);transition:all 0.3s;text-decoration:none;display:inline-block}
.enterbtn:hover{background:rgba(201,168,76,0.15);box-shadow:0 0 25px rgba(201,168,76,.3);letter-spacing:6px}
.footnote{font-family:'Crimson Text',serif;font-style:italic;font-size:9px;letter-spacing:2px;color:#42362a;margin-top:24px}
</style>
</head>
<body>
<div class="root">
  <div class="bglayer"></div>
  <div class="emberlayer" id="emberlayer"></div>
  <div class="z1">
    <div class="glyph">☸</div>
    <div class="htitle">SPUN BY GODS</div>
    <div class="hdiv"></div>
    <div class="htag">Fate is not chosen. It is Spun.</div>
    <a class="enterbtn" href="blood_spin.html">ENTER</a>
    <div class="footnote">✦ THE MYTH ENGINE AWAITS ✦</div>
  </div>
</div>
<script>
const layer=document.getElementById('emberlayer');
for(let i=0;i<14;i++){
  const e=document.createElement('div');
  e.className='ember';
  e.style.left=Math.random()*100+'%';
  e.style.animationDuration=(6+Math.random()*6)+'s';
  e.style.animationDelay=(Math.random()*8)+'s';
  layer.appendChild(e);
}
</script>
</body>
</html>
